    <h1>Boot scripts</h1>
    <p> FS mode uses bootscripts that are run at boot. These use the file extension <code>.rcS</code>. The boot script should have the following format: </p>
    <pre><code>#!/bin/sh
    

        
/sbin/m5 exit</code></pre>

    <p> I have included a sample file <a href="samples/bootscript.rcS">here</a> as well.</p>
